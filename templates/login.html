<!DOCTYPE html>
<html>

<head>
    <title>Portal Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="card glass" style="border-radius: 24px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <div
                    style="background: var(--accent-gradient); color: white; width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 28px; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); transform: rotate(-5deg);">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1
                    style="font-size: 28px; font-weight: 800; color: var(--text-main); letter-spacing: -0.025em; margin-bottom: 8px;">
                    Welcome Back</h1>
                <p style="color: var(--text-muted); font-size: 15px;">Login to access your placement dashboard</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}

            <div class="tabs" style="height: 48px; padding: 6px;">
                <button id="btnAdmin" class="{% if user_type != 'student' %}active{% endif %}" onclick="showAdmin()"
                    style="font-size: 14px; letter-spacing: 0.01em;">Administrator</button>
                <button id="btnStudent" class="{% if user_type == 'student' %}active{% endif %}" onclick="showStudent()"
                    style="font-size: 14px; letter-spacing: 0.01em;">Student</button>
            </div>

            <!-- Admin Form -->
            <form id="adminForm" method="POST" class="{% if user_type == 'student' %}hidden{% endif %}">
                <input type="hidden" name="user_type" value="admin">
                <div style="position: relative; margin-bottom: 20px;">
                    <i class="fas fa-user-shield"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px;"></i>
                    <input type="text" name="username" placeholder="Admin Username" required
                        style="padding-left: 48px; margin-bottom: 0; background: white; border: 1.5px solid var(--border-color);">
                </div>
                <div style="position: relative; margin-bottom: 24px;">
                    <i class="fas fa-key"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px;"></i>
                    <input type="password" name="password" placeholder="Password" required
                        style="padding-left: 48px; margin-bottom: 0; background: white; border: 1.5px solid var(--border-color);">
                </div>
                <button type="submit"
                    style="background: var(--accent-gradient); box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);"><i
                        class="fas fa-sign-in-alt" style="margin-right: 12px;"></i> Login as
                    Admin</button>
            </form>

            <!-- Student Form -->
            <form id="studentForm" method="POST" class="{% if user_type != 'student' %}hidden{% endif %}">
                <input type="hidden" name="user_type" value="student">
                <div style="position: relative; margin-bottom: 20px;">
                    <i class="fas fa-id-card"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px;"></i>
                    <input type="text" name="reg_no" placeholder="Registration Number" required
                        style="padding-left: 48px; margin-bottom: 0; background: white; border: 1.5px solid var(--border-color);">
                </div>
                <div style="position: relative; margin-bottom: 24px;">
                    <i class="fas fa-lock"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px;"></i>
                    <input type="password" name="password" placeholder="Password" required
                        style="padding-left: 48px; margin-bottom: 0; background: white; border: 1.5px solid var(--border-color);">
                </div>
                <button type="submit"
                    style="background: var(--accent-gradient); box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);"><i
                        class="fas fa-sign-in-alt" style="margin-right: 12px;"></i> Login as Student</button>
            </form>

        </div>
    </div>

    <script>
        function showAdmin() {
            const adminForm = document.getElementById("adminForm");
            const studentForm = document.getElementById("studentForm");
            const btnAdmin = document.getElementById("btnAdmin");
            const btnStudent = document.getElementById("btnStudent");

            adminForm.classList.remove("hidden");
            studentForm.classList.add("hidden");
            btnAdmin.classList.add("active");
            btnStudent.classList.remove("active");

            // Add a subtle fade-in animation
            adminForm.style.animation = "fadeIn 0.3s ease-out";
        }
        function showStudent() {
            const adminForm = document.getElementById("adminForm");
            const studentForm = document.getElementById("studentForm");
            const btnAdmin = document.getElementById("btnAdmin");
            const btnStudent = document.getElementById("btnStudent");

            adminForm.classList.add("hidden");
            studentForm.classList.remove("hidden");
            btnStudent.classList.add("active");
            btnAdmin.classList.remove("active");

            // Add a subtle fade-in animation
            studentForm.style.animation = "fadeIn 0.3s ease-out";
        }
    </script>

</body>

</html>
