<!DOCTYPE html>
<html>

<head>
    <title>Add Company Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: #fafafa;
            transition: all 0.2s ease-in-out;
            resize: vertical;
            min-height: 100px;
            display: block;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            background-color: var(--bg-card);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div style="text-align: center; margin-bottom: 24px;">
                <div
                    style="background: var(--primary-color); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; font-size: 24px; box-shadow: var(--shadow-md);">
                    <i class="fas fa-building"></i>
                </div>
                <h2 style="margin-bottom: 16px;">Add Company</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: -8px;">Enter company details below</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/add_company">

                <div style="position: relative;">
                    <i class="fas fa-building"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="text" name="name" placeholder="Company Name" required style="padding-left: 40px;">
                </div>

                <div style="position: relative;">
                    <i class="fas fa-link"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="url" name="url" placeholder="Company URL (https://...)" required
                        style="padding-left: 40px;">
                </div>

                <div style="position: relative;">
                    <i class="fas fa-info-circle"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <textarea name="about" placeholder="About Company" required style="padding-left: 40px;"></textarea>
                </div>

                <div style="position: relative; margin-bottom: 24px;">
                    <i class="fas fa-calendar-alt"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="date" name="end_date" style="padding-left: 40px; width: 100%; box-sizing: border-box;"
                        title="Last Date to Apply (Optional)">
                    <small
                        style="color: var(--text-muted); display: block; margin-top: 4px; font-size: 12px; margin-left: 2px;">Last
                        date to apply (optional)</small>
                </div>

                <button type="submit"><i class="fas fa-save" style="margin-right: 8px;"></i> Save Details</button>
            </form>

            <br>
            <a href="/admin_companies" class="logout-btn" style="margin-top: 8px;"><i class="fas fa-arrow-left"
                    style="margin-right: 8px;"></i> Back</a>
        </div>
    </div>

</body>

</html>
