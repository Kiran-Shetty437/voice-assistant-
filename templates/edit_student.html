<!DOCTYPE html>
<html>

<head>
    <title>Edit Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="card">
            <div style="text-align: center; margin-bottom: 24px;">
                <div
                    style="background: #10b981; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; font-size: 24px; box-shadow: var(--shadow-md);">
                    <i class="fas fa-user-edit"></i>
                </div>
                <h2 style="margin-bottom: 16px;">Edit Student</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: -8px;">Update student details</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('edit_student', id=student['id']) }}" enctype="multipart/form-data">

                <div style="position: relative;">
                    <i class="fas fa-user"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="text" name="name" value="{{ student['name'] }}" placeholder="Student Name" required
                        style="padding-left: 40px;">
                </div>

                <div style="position: relative;">
                    <i class="fas fa-id-badge"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="text" name="roll_number" value="{{ student['roll_number'] }}" placeholder="Roll Number"
                        required style="padding-left: 40px; margin-bottom: 16px;">
                </div>

                <div style="position: relative;">
                    <i class="fas fa-book"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <select name="course" required style="padding-left: 40px;">
                        <option value="">Select Course</option>
                        <option value="BCA" {% if student['course']=='BCA' %}selected{% endif %}>BCA</option>
                        <option value="BBA" {% if student['course']=='BBA' %}selected{% endif %}>bba</option>
                        <option value="BA" {% if student['course']=='BA' %}selected{% endif %}>BA</option>
                        <option value="Bsc" {% if student['course']=='Bsc' %}selected{% endif %}>Bsc</option>
                        <option value="Bcom" {% if student['course']=='Bcom' %}selected{% endif %}>Bcom</option>
                    </select>
                </div>

                <div style="position: relative;">
                    <i class="fas fa-layer-group"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <select name="section" required style="padding-left: 40px;">
                        <option value="">Select Section</option>
                        <option value="A" {% if student['section']=='A' %}selected{% endif %}>A</option>
                        <option value="B" {% if student['section']=='B' %}selected{% endif %}>B</option>
                        <option value="C" {% if student['section']=='C' %}selected{% endif %}>C</option>
                        <option value="D" {% if student['section']=='D' %}selected{% endif %}>D</option>
                        <option value="E" {% if student['section']=='E' %}selected{% endif %}>E</option>
                        <option value="F" {% if student['section']=='F' %}selected{% endif %}>F</option>
                    </select>
                </div>

                <div style="position: relative;">
                    <i class="fas fa-phone"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="text" name="phone" value="{{ student['phone'] }}"
                        placeholder="Phone Number (10 digits)" pattern="\d{10}" maxlength="10" title="Only 10 digits phone number"
                        required style="padding-left: 40px;">
                </div>

                <div style="position: relative;">
                    <i class="fas fa-envelope"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="email" name="email" value="{{ student['email'] }}" placeholder="Email Address" required
                        style="padding-left: 40px;">
                </div>

                <div style="position: relative;">
                    <i class="fas fa-camera"
                        style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
                    <input type="file" name="photo" accept="image/*"
                        style="padding-left: 40px; background: white; padding-top: 10px;">
                </div>
                <small
                    style="color:var(--text-muted); display:block; margin-top:-12px; margin-bottom:16px; font-size: 12px; margin-left: 4px;">Student
                    Photo (Optional, leave blank to keep current)</small>

                <button type="submit"><i class="fas fa-save" style="margin-right: 8px;"></i> Save</button>
            </form>

            <br>
            <a href="/admin_students" class="logout-btn" style="margin-top: 8px;"><i class="fas fa-arrow-left"
                    style="margin-right: 8px;"></i> Back</a>
        </div>
    </div>

</body>

</html>
